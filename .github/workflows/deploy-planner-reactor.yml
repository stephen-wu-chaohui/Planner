name: Deploy Planner.Reactor Function App

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/Planner.Reactor/**'
      - 'src/Planner.Contracts/**'
      - '.github/workflows/deploy-planner-reactor.yml'
      - 'global.json'

permissions:
  id-token: write
  contents: read

env:
  AZURE_FUNCTION_APP_NAME: ${{ vars.AZURE_REACTOR_FUNCTION_APP_NAME }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Publish
        run: dotnet publish src/Planner.Reactor/Planner.Reactor.csproj -c Release -o publish/reactor

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish/reactor/* -DestinationPath publish/reactor.zip -Force

      - name: Deploy zip package
        uses: azure/CLI@v3
        with:
          inlineScript: |
            set -eo pipefail
            az functionapp show \
              --name "${AZURE_FUNCTION_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              >/dev/null
            az functionapp deployment source config-zip \
              --name "${AZURE_FUNCTION_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --src publish/reactor.zip
