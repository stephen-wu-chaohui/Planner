name: Database Migrate & Seed (dev)

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Database command to run'
        required: true
        default: 'migrate-and-seed'
        type: choice
        options:
          - migrate-and-seed
          - migrate
          - seed
  push:
    branches:
      - main
    paths:
      - 'tools/Planner.Tools.DbMigrator/**'
      - 'src/Planner.Infrastructure/**'
      - 'src/Planner.Domain/**'
      - 'src/Planner.Application/**'
      - 'src/Planner.Contracts/**'
      - 'src/Planner.Messaging/**'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'global.json'
      - '.github/workflows/db-migrator-dev.yml'

permissions:
  id-token: write
  contents: read

env:
  AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_DB_MIGRATE_JOB_NAME: ${{ vars.AZURE_DB_MIGRATE_JOB_NAME }}
  AZURE_DB_SEED_JOB_NAME: ${{ vars.AZURE_DB_SEED_JOB_NAME }}
  IMAGE_NAME: planner-db-migrator

jobs:
  migrate-and-seed:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ACR (OIDC)
        run: |
          az acr login --name $(echo "${AZURE_CONTAINER_REGISTRY}" | cut -d'.' -f1)

      - name: Build and push DbMigrator image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: tools/Planner.Tools.DbMigrator/Dockerfile
          push: true
          tags: |
            ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Install Azure Container Apps extension
        uses: azure/CLI@v3
        with:
          inlineScript: |
            az extension add --name containerapp --upgrade

      - name: Run DbMigrator jobs
        uses: azure/CLI@v3
        env:
          DB_COMMAND: ${{ github.event.inputs.command || 'migrate-and-seed' }}
        with:
          inlineScript: |
            set -eo pipefail

            IMAGE_TAG="${AZURE_CONTAINER_REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
            JOB_CONTAINER_NAME="planner-db-migrator"

            dump_job_logs() {
              local job_name="$1"
              local execution_name="$2"
              local environment_id
              local workspace_id
              local log_query

              echo "::group::$job_name/$execution_name logs"
              az containerapp job logs show \
                --name "$job_name" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --execution "$execution_name" \
                --container "$JOB_CONTAINER_NAME" \
                --tail 300 \
                --format text || true

              environment_id="$(az containerapp job show \
                --name "$job_name" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --query properties.environmentId \
                -o tsv 2>/dev/null || true)"

              if [ -n "$environment_id" ]; then
                workspace_id="$(az containerapp env show \
                  --ids "$environment_id" \
                  --query properties.appLogsConfiguration.logAnalyticsConfiguration.customerId \
                  -o tsv 2>/dev/null || true)"
              fi

              if [ -n "${workspace_id:-}" ]; then
                sleep 20
                log_query="ContainerAppConsoleLogs_CL | where TimeGenerated > ago(2h) | where ContainerJobName_s == '$job_name' and ContainerGroupName_s startswith '$execution_name' | project TimeGenerated, Stream_s, Log_s | order by TimeGenerated asc"
                az monitor log-analytics query \
                  --workspace "$workspace_id" \
                  --analytics-query "$log_query" \
                  -o table || true
              fi

              echo "::endgroup::"
            }

            wait_for_job() {
              local job_name="$1"
              local execution_name="$2"

              for attempt in $(seq 1 120); do
                status="$(az containerapp job execution show \
                  --name "$job_name" \
                  --resource-group "$AZURE_RESOURCE_GROUP" \
                  --job-execution-name "$execution_name" \
                  --query properties.status \
                  -o tsv)"

                echo "$job_name/$execution_name status: $status"

                if [ "$status" = "Succeeded" ]; then
                  return 0
                fi

                if [ "$status" = "Failed" ] || [ "$status" = "Canceled" ]; then
                  dump_job_logs "$job_name" "$execution_name"
                  return 1
                fi

                sleep 15
              done

              echo "Timed out waiting for $job_name/$execution_name"
              dump_job_logs "$job_name" "$execution_name"
              return 1
            }

            run_job() {
              local job_name="$1"
              az containerapp job update \
                --name "$job_name" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --image "$IMAGE_TAG" \
                >/dev/null

              execution_name="$(az containerapp job start \
                --name "$job_name" \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --query name \
                -o tsv)"

              wait_for_job "$job_name" "$execution_name"
            }

            case "$DB_COMMAND" in
              migrate-and-seed)
                run_job "$AZURE_DB_MIGRATE_JOB_NAME"
                run_job "$AZURE_DB_SEED_JOB_NAME"
                ;;
              migrate)
                run_job "$AZURE_DB_MIGRATE_JOB_NAME"
                ;;
              seed)
                run_job "$AZURE_DB_SEED_JOB_NAME"
                ;;
              *)
                echo "Unknown command: $DB_COMMAND"
                exit 1
                ;;
            esac
