name: Deploy Planner.API to Azure Container Apps (dev)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/Planner.API/**'
      - 'src/Planner.Application/**'
      - 'src/Planner.Domain/**'
      - 'src/Planner.Infrastructure/**'
      - 'src/Planner.Contracts/**'
      - 'src/Planner.Messaging/**'
      - '.github/workflows/deploy-planner-api-aca.yml'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'global.json'

permissions:
  id-token: write
  contents: read

env:
  AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}
  AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_API_CONTAINER_APP_NAME }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  IMAGE_NAME: planner-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ACR (OIDC)
        run: |
          az acr login --name $(echo "${AZURE_CONTAINER_REGISTRY}" | cut -d'.' -f1)

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Planner.API/Dockerfile
          push: true
          tags: |
            ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Install Azure Container Apps extension
        uses: azure/CLI@v3
        with:
          inlineScript: |
            az extension add --name containerapp --upgrade

      - name: Deploy to Azure Container Apps
        uses: azure/CLI@v3
        with:
          inlineScript: |
            set -eo pipefail

            IMAGE_TAG="${AZURE_CONTAINER_REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"

            az containerapp show \
              --name "${AZURE_CONTAINER_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              >/dev/null

            az containerapp update \
              --name "${AZURE_CONTAINER_APP_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --image "${IMAGE_TAG}"
