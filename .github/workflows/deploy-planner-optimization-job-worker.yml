name: Deploy planner.optimization.jobworker to Azure Container Apps Job

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/Planner.Optimization.JobWorker/**'
      - 'src/Planner.Optimization/**'
      - 'src/Planner.Application/**'
      - 'src/Planner.Contracts/**'
      - 'src/Planner.Infrastructure/**'
      - '.github/workflows/deploy-planner-optimization-job-worker.yml'
      - 'global.json'

permissions:
  id-token: write
  contents: read

env:
  AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}
  AZURE_CONTAINER_APP_JOB_NAME: ${{ vars.AZURE_OPTIMIZATION_JOB_NAME }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  IMAGE_NAME: planner-optimization-job-worker

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ACR
        run: az acr login --name $(echo "${AZURE_CONTAINER_REGISTRY}" | cut -d'.' -f1)

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Planner.Optimization.JobWorker/Dockerfile
          push: true
          tags: |
            ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Install Azure Container Apps extension
        uses: azure/CLI@v3
        with:
          inlineScript: az extension add --name containerapp --upgrade

      - name: Deploy image to Azure Container Apps Job
        uses: azure/CLI@v3
        with:
          inlineScript: |
            set -eo pipefail
            IMAGE_TAG="${AZURE_CONTAINER_REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
            az containerapp job show \
              --name "${AZURE_CONTAINER_APP_JOB_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              >/dev/null
            az containerapp job update \
              --name "${AZURE_CONTAINER_APP_JOB_NAME}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --image "${IMAGE_TAG}"
