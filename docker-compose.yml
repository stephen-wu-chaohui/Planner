services:
  # SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    deploy:
      resources:
        limits:
          memory: 4g  # Adjust based on your available host memory
        reservations:
          memory: 2g
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=PlannerDevPass123
      - MSSQL_MEMORY_LIMIT_MB=2048  # Limits SQL to 2GB instead of all available
    volumes:
      - sqlserver_data:/var/opt/mssql

  # The Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5673:5672"   # External Port: 5673 | Internal Port: 5672
      - "15673:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=planner
      - RABBITMQ_DEFAULT_PASS=planner
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # .NET Core API
  planner-api:
    build:
      context: .
      dockerfile: src/Planner.API/Dockerfile
    container_name: planner-api
    ports:
      - "5000:5000"
      - "7085:7085"
    depends_on:
      sqlserver:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000;http://+:7085
      - Optimization__DispatchMode=${OPTIMIZATION_DISPATCH_MODE:-RabbitMq}
      - OptimizationMessaging__Transport=${OPTIMIZATION_MESSAGING_TRANSPORT:-RabbitMQ}
      - Optimization__WorkerResultApiKey=${OPTIMIZATION_WORKER_RESULT_API_KEY:-planner-dev-worker-result-key}
      - ConnectionStrings__PlannerDb=Server=sqlserver,1433;Database=PlannerDB;User Id=sa;Password=PlannerDevPass123;Encrypt=False;TrustServerCertificate=True;
      - SignalR__Server=http://planner-api:7085
      - SignalR__Client=http://localhost:7014
      - SignalR__Route=/hubs/planner
      - Cors__AllowedOrigins__0=https://localhost:7014
      - Cors__AllowedOrigins__1=http://localhost:5212
      - RabbitMq__Host=${RABBITMQ_HOST:-rabbitmq}
      - RabbitMq__User=${RABBITMQ_USERNAME:-planner}
      - RabbitMq__Pass=${RABBITMQ_PASSWORD:-planner}
      - RabbitMq__Port=${RABBITMQ_PORT:-5672}
      - AzureAd__Instance=https://login.microsoftonline.com/
      - AzureAd__TenantId=common
      - AzureAd__ClientId=8621f365-5e51-4b25-931a-1c717ead22ac
      - Firestore__ProjectId=${FIRESTORE_PROJECT_ID}
      - Firestore__DatabaseId=${FIRESTORE_DATABASE_ID}
      - Cosmos__ConnectionString=AccountEndpoint=https://cosmosdb:8081/;AccountKey=${COSMOS_EMULATOR_KEY:-cGxhbm5lci1sb2NhbC1jb3Ntb3MtZW11bGF0b3ItZGV2ZWxvcG1lbnQta2V5LTAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMA==};DisableServerCertificateValidation=True;
      - Cosmos__DatabaseName=planner
      - Cosmos__OptimizationRunsContainerName=optimizationRuns
      - Cosmos__ConnectionMode=Gateway
      - Cosmos__RequestTimeoutSeconds=15
      - Cosmos__DisableServerCertificateValidation=${COSMOS_DISABLE_SERVER_CERTIFICATE_VALIDATION:-true}
      - ServiceBus__ConnectionString=Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;
      - ServiceBus__OptimizationQueueName=optimization-jobs
      - SignalR__ConnectionString=${AZURE_SIGNALR_CONNECTION_STRING}
      - SignalR__HubName=planner
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - FIREBASE_CONFIG_JSON=${FIREBASE_CONFIG_JSON}
    restart: unless-stopped

  # Azure Cosmos DB emulator (optional Azure async optimization profile)
  cosmosdb:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-latest
    container_name: cosmosdb
    profiles: ["azure-emulators"]
    command: ["--gateway-endpoint", "cosmosdb"]
    ports:
      - "8081:8081"
      - "8080:8080"
      - "1234:1234"
    environment:
      - PROTOCOL=https
      - KEY_FILE=/cosmos/key
      - ENABLE_INIT_DATA=true
      - INIT_PATH=/init
      - ENABLE_TELEMETRY=false
    volumes:
      - ./infra/local/cosmos-emulator.key:/cosmos/key:ro
      - ./infra/local/cosmos-init:/init:ro
      - cosmos_data:/data
    restart: unless-stopped

  # SQL dependency for Azure Service Bus emulator
  servicebus-mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: servicebus-mssql
    profiles: ["azure-emulators"]
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=ServiceBusDevPass123
    restart: unless-stopped

  # Azure Service Bus emulator (optional Azure async optimization profile)
  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: servicebus-emulator
    profiles: ["azure-emulators"]
    volumes:
      - ./infra/local/servicebus-emulator-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      - SQL_SERVER=servicebus-mssql
      - MSSQL_SA_PASSWORD=ServiceBusDevPass123
      - ACCEPT_EULA=Y
      - EMULATOR_HTTP_PORT=5300
    depends_on:
      - servicebus-mssql
    restart: unless-stopped

  # .NET Optimization Worker
  planner-optimization-worker:
    build:
      context: .
      dockerfile: src/Planner.Optimization.Worker/Dockerfile
    container_name: planner-optimization-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      planner-api:
        condition: service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Optimization__DispatchMode=${OPTIMIZATION_DISPATCH_MODE:-RabbitMq}
      - OptimizationMessaging__Transport=${OPTIMIZATION_MESSAGING_TRANSPORT:-RabbitMQ}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__User=planner
      - RabbitMq__Pass=planner
      - RabbitMq__Port=5672
      - Cosmos__ConnectionString=AccountEndpoint=https://cosmosdb:8081/;AccountKey=${COSMOS_EMULATOR_KEY:-cGxhbm5lci1sb2NhbC1jb3Ntb3MtZW11bGF0b3ItZGV2ZWxvcG1lbnQta2V5LTAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMA==};DisableServerCertificateValidation=True;
      - Cosmos__DatabaseName=planner
      - Cosmos__OptimizationRunsContainerName=optimizationRuns
      - Cosmos__ConnectionMode=Gateway
      - Cosmos__RequestTimeoutSeconds=15
      - Cosmos__DisableServerCertificateValidation=${COSMOS_DISABLE_SERVER_CERTIFICATE_VALIDATION:-true}
      - ServiceBus__ConnectionString=Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;
      - ServiceBus__OptimizationQueueName=optimization-jobs
      - PlannerApi__BaseUrl=http://planner-api:5000
      - Optimization__WorkerResultApiKey=${OPTIMIZATION_WORKER_RESULT_API_KEY:-planner-dev-worker-result-key}
      - SignalR__Server=http://planner-api:7085
      - SignalR__Client=http://localhost:7014
      - SignalR__Route=/hubs/planner
    restart: unless-stopped

  # Python AI Worker - No RabbitMQ dependency
  planner-ai-worker:
    build:
      context: src/Planner.AI/
      dockerfile: Dockerfile
    container_name: planner-ai-worker
    environment:
      - PYTHONUNBUFFERED=1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - FIRESTORE_DATABASE_ID=${FIRESTORE_DATABASE_ID}
      - FIREBASE_CONFIG_JSON=${FIREBASE_CONFIG_JSON}
    restart: unless-stopped

volumes:
  sqlserver_data:
  rabbitmq_data:
  cosmos_data:
